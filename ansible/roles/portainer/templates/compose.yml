# kics-scan ignore
services:
  portainer:
    image: portainer/portainer-ce:2.33.0-rc2@sha256:159b023999a3c01f486df54b58f281a8f652e216f67caab468d0cba4711a12cb
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # kics-scan ignore-line: d6355c88-1e8d-49e9-b2f2-f8a1ca12c75b
      - ./portainer_data:/data
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # kics-scan ignore-line: ce76b7d0-9e77-464d-b86f-c5c48e03e22d
      - DAC_OVERRIDE # kics-scan ignore-line: ce76b7d0-9e77-464d-b86f-c5c48e03e22d
      - FOWNER # kics-scan ignore-line: ce76b7d0-9e77-464d-b86f-c5c48e03e22d
      - SETGID # kics-scan ignore-line: ce76b7d0-9e77-464d-b86f-c5c48e03e22d
      - SETUID # kics-scan ignore-line: ce76b7d0-9e77-464d-b86f-c5c48e03e22d
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
